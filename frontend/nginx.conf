server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Gzip
  gzip on;
  gzip_types text/plain text/html text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Proxy API requests to the backend
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — index.html serves all routes
  location / {
    try_files $uri $uri/ /index.html;

    # index.html is the SPA shell: cache lightly (or revalidate always so
    # the versioned assets below are resolved from the fresh page).
    add_header Cache-Control "no-cache" always;
  }

  # Versioned static assets (Vite appends hash to filenames → safe to cache forever)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
  }

  # Static files in public/ (robots.txt, sitemap.xml, og-image.png, env.js)
  location ~ ^/(robots\.txt|sitemap\.xml|og-image\.png|env\.js|favicon\.ico)$ {
    expires 1d;
    add_header Cache-Control "public, must-revalidate" always;
    access_log off;
  }
}
